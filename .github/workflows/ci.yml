name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install C compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcc

      - name: Build (CGo enabled)
        run: CGO_ENABLED=1 go build -o gitlens .

      - name: Build (CGo disabled)
        run: CGO_ENABLED=0 go build -o gitlens-nocgo .

      - name: Vet
        run: go vet ./...

      - name: Test (CGo enabled)
        run: CGO_ENABLED=1 go test ./... -count=1 -timeout 120s

      - name: Test (CGo disabled)
        run: CGO_ENABLED=0 go test ./... -count=1 -timeout 120s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m
